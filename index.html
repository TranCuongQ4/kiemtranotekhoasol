<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiểm Tra Note Nhạc Khóa SOL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Kiểm Tra Note Nhạc Khóa SOL</h1>
        
        <!-- Chữ thông báo được đưa lên ngay dưới tiêu đề -->
        <div id="feedback" class="feedback"></div>
        
        <div id="note-container">
            <img id="note-image" src="G3.jpg" alt="Note nhạc">
        </div>
        
        <div id="options" class="options-grid"></div>
        
        <button id="new-round" class="btn-new">
            <span>Lượt Mới</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
